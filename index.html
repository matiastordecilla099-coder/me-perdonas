<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>¿Me perdonas?</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Comic Sans MS', cursive;
      background: linear-gradient(135deg, #ffd6ec, #cce7ff);
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 3.5em;
      color: #ff69b4;
      animation: latido 1.5s infinite;
    }

    @keyframes latido {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    button {
      font-size: 1.2em;
      padding: 12px 25px;
      margin: 15px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
    }

    #si {
      background-color: #ffb6c1;
    }

    #no {
      position: absolute;
      background-color: #87cefa;
      color: white;
    }

    #musicaBtn {
      background-color: #ffd700;
    }

    #mensaje {
      font-size: 2em;
      color: #ff1493;
      margin-top: 20px;
    }

    .osito {
      position: absolute;
      width: 130px;
      transition: 0.5s;
    }

    .corazon {
      position: absolute;
      animation: subir 5s linear infinite;
    }

    @keyframes subir {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>

<body>

<h1>¿ Mel, mi vida, Me perdonas? </h1>

<button id="musicaBtn">🎵 Toca aquí</button>

<br>

<button id="si">SI 💖</button>
<button id="no">NO 💔</button>

<div id="mensaje"></div>

<audio id="audio" preload="auto">
  <source src="https://raw.githubusercontent.com/matiastordecilla099-coder/me-perdonas/main/flaca.mp3" type="audio/mpeg">
</audio>

<img id="oso1" class="osito" src="https://i.pinimg.com/originals/2a/14/cb/2a14cbc5ca811614d535f45571249a4c.png" style="top:10%; left:5%;">
<img id="oso2" class="osito" src="https://i.pinimg.com/originals/2a/14/cb/2a14cbc5ca811614d535f45571249a4c.png" style="top:20%; right:5%;">
<img id="oso3" class="osito" src="https://i.pinimg.com/originals/2a/14/cb/2a14cbc5ca811614d535f45571249a4c.png" style="bottom:10%; left:15%;">
<img id="oso4" class="osito" src="https://i.pinimg.com/originals/2a/14/cb/2a14cbc5ca811614d535f45571249a4c.png" style="bottom:10%; right:15%;">

<script>

  const audio = document.getElementById("audio");
  const btnMusica = document.getElementById("musicaBtn");
  const btnSi = document.getElementById("si");
  const btnNo = document.getElementById("no");

  /* Música */
  btnMusica.addEventListener("click", () => {
    audio.play();
  });

  /* Botón NO (funciona en celular también) */
  btnNo.addEventListener("touchstart", moverNo);
  btnNo.addEventListener("mouseover", moverNo);

  function moverNo() {
    btnNo.style.left = Math.random() * (window.innerWidth - 100) + "px";
    btnNo.style.top = Math.random() * (window.innerHeight - 50) + "px";
  }

  /* Botón SI */
  btnSi.addEventListener("click", aceptar);

  function aceptar() {
    document.getElementById("mensaje").innerHTML =
      "💖 Los ositos y yo sabiamos que dirias que si, te amo mi enojona 💖";

    cambiarOsitos();
    lanzarCorazones();
    audio.play();
  }

  /* Cambiar ositos */
  function cambiarOsitos() {
    const nueva = "https://i.pinimg.com/736x/bc/be/5e/bcbe5ef87e4f67e45dd314eca029db4b.jpg";

    document.getElementById("oso1").src = nueva;
    document.getElementById("oso2").src = nueva;
    document.getElementById("oso3").src = nueva;
    document.getElementById("oso4").src = nueva;
  }

  /* Corazones */
  function crearCorazon() {
    let corazon = document.createElement("div");
    corazon.className = "corazon";
    corazon.innerHTML = "💖";
    corazon.style.left = Math.random() * window.innerWidth + "px";

    document.body.appendChild(corazon);
    setTimeout(() => corazon.remove(), 5000);
  }
  setInterval(crearCorazon, 300);

  /* Explosión */
  function lanzarCorazones() {
    for (let i = 0; i < 40; i++) {
      let c = document.createElement("div");
      c.innerHTML = "💖";
      c.style.position = "absolute";
      c.style.left = "50%";
      c.style.top = "50%";

      document.body.appendChild(c);

      let x = (Math.random() - 0.5) * 800;
      let y = (Math.random() - 0.5) * 600;

      c.animate([
        { transform: "translate(0,0)", opacity: 1 },
        { transform: `translate(${x}px, ${y}px)`, opacity: 0 }
      ], { duration: 1500 });

      setTimeout(() => c.remove(), 1500);
    }
  }

</script>

</body>
</html>
